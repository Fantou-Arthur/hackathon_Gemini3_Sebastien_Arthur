<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVR - Agent Monitoring</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        #vr-container { width: 70%; height: 100%; position: relative; }
        #terminal-container {
            width: 30%; height: 100%;
            background-color: #000; color: #0f0;
            display: flex; flexDirection: column;
            border-left: 2px solid #333;
        }
        #terminal-header {
            padding: 15px; text-align: center;
            border-bottom: 1px solid #0f0;
            font-weight: bold; font-size: 1.2em;
            letter-spacing: 2px; text-transform: uppercase;
        }
        #architect-panel { padding: 15px; border-bottom: 1px solid #0f0; background-color: #111; }
        #promptInput {
            width: 100%; box-sizing: border-box;
            background: #000; color: #0f0;
            border: 1px solid #333; padding: 8px;
            font-family: monospace; resize: none;
            margin-bottom: 10px;
        }
        #generateBtn {
            width: 100%; background: #0f0; color: #000;
            border: none; padding: 10px;
            font-weight: bold; cursor: pointer;
            font-family: monospace; text-transform: uppercase;
        }
        #generateBtn:disabled { background: #555; color: #888; cursor: not-allowed; }
        #status { margin-top: 10px; font-size: 0.85em; color: #888; text-align: center; }
        #agent-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.9em; line-height: 1.5; }
        .log-entry { margin-bottom: 5px; word-wrap: break-word; }
        .log-time { color: #888; margin-right: 10px; }
        .log-highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="vr-container">
        <a-scene embedded>
            <a-sky color="#1a1a1a"></a-sky> 
            <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#333" material="roughness: 1;"></a-plane>
            <a-entity id="dynamic-world"></a-entity>
            <a-entity position="0 1.6 4"><a-camera></a-camera></a-entity>
            <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
            <a-light type="directional" color="#fff" intensity="0.7" position="-1 2 1"></a-light>
        </a-scene>
    </div>

    <div id="terminal-container">
        <div id="terminal-header">Agent Logs</div>
        <div id="architect-panel">
            <div style="margin-bottom: 8px; color: #fff; font-size: 0.9em;">Agent Architecte 3D</div>
            <textarea id="promptInput" rows="3" placeholder="Ex: Crée une scène..."></textarea>
            <button id="generateBtn">Générer le monde</button>
            <button id="toggleIABtn" style="margin-top: 5px; background: #333; color: #0f0; border: 1px solid #0f0; padding: 5px; width: 100%; font-family: monospace; cursor: pointer;">IA : ON</button>
            <div id="status">Chargement du système...</div>
        </div>
        <div id="agent-logs">
            <div class="log-entry"><span class="log-time">[SYS]</span> Initialisation des modules...</div>
        </div>
    </div>

    <!-- Chargement de l'application via le point d'entrée UI -->
    <script type="module">
        import { initUI } from './js/ui/main_ui.js';
        window.addEventListener('DOMContentLoaded', initUI);
    </script>
</body>
</html>
